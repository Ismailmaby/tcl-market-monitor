name: TCL Market Intelligence Monitor

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  run-monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: sudo apt-get install -y ffmpeg

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run market monitor
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_PASS: ${{ secrets.GMAIL_PASS }}
          RECIPIENT: ${{ secrets.RECIPIENT }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python monitor.py

      - name: Commit audio and RSS feed
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add docs/ output/ || true
          git diff --staged --quiet || git commit -m "chore: daily briefing $(date +%Y-%m-%d)"
          git push

      - name: Upload Markdown as artifact
        uses: actions/upload-artifact@v4
        with:
          name: market-intel-${{ github.run_id }}
          path: output/*.md
          retention-days: 30
