name: TCL Market Intelligence Monitor

on:
  schedule:
    - cron: "0 0 * * *"
    - cron: "0 10 * * *"
  workflow_dispatch:
    inputs:
      session:
        description: "Session type"
        required: false
        default: "morning"
        type: choice
        options:
          - morning
          - evening

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  run-monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: sudo apt-get install -y ffmpeg

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Determine session
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "SESSION=${{ github.event.inputs.session }}" >> $GITHUB_ENV
          else
            HOUR=$(date -u +%H)
            if [ "$HOUR" = "00" ]; then
              echo "SESSION=morning" >> $GITHUB_ENV
            else
              echo "SESSION=evening" >> $GITHUB_ENV
            fi
          fi

      - name: Run market monitor
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_PASS: ${{ secrets.GMAIL_PASS }}
          RECIPIENT: ${{ secrets.RECIPIENT }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SESSION: ${{ env.SESSION }}
        run: python monitor.py

      - name: Commit audio and RSS
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add docs/ output/ || true
          git diff --staged --quiet || (git stash && git pull --rebase origin main && git stash pop && git add docs/ output/ || true && git commit -m "chore: ${{ env.SESSION }} briefing $(date +%Y-%m-%d)" && git push)
          git diff --staged --quiet || git commit -m "chore: ${{ env.SESSION }} briefing $(date +%Y-%m-%d)"
          git pull --rebase origin main
          git push

      - name: Upload Markdown artifact
        uses: actions/upload-artifact@v4
        with:
          name: market-intel-${{ github.run_id }}
          path: output/*.md
          retention-days: 30
